spring:
  main:
    allow-circular-references: true
  rabbitmq:
    host: b-ddc407cb-5671-4f40-8111-ec44f61d6fe9.mq.ap-east-1.on.aws
    port: 5671
    username: admin
    password: 4ZBVdkfJW6QKhYc
    virtual-host: /
    ssl:
      enabled: true
      verify-hostname: false
      algorithm: TLSv1.2
    connection-timeout: 30000
    requested-heartbeat: 30
    # 连接工厂配置
    cache:
      channel:
        size: 25
      connection:
        mode: CHANNEL
    # 监听器配置
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        concurrency: 1
        max-concurrency: 3
        retry:
          enabled: false
        default-requeue-rejected: false
  cloud:
    sentinel:
      # 是否开启Sentinel客户端
      enabled: false
      # 启动时立即初始化并向控制台发送心跳
      eager: false
      # Web资源按请求方法区分，例如 GET:/api/account/exist
      http-method-specify: true
      # false=每个URL资源独立统计；true=统一到同一个Web上下文
      web-context-unify: false
      transport:
        # Sentinel控制台地址；本地控制台为 http://127.0.0.1:8858/
        dashboard: 172.17.0.1:8858
        # 应用本地启动一个HTTP端口，用于接收控制台推送规则
        port: 8200
        # Dashboard用Docker启动时，127.0.0.1会指向容器自己；这里填Docker能访问到的宿主机真实IP
        client-ip: 172.17.0.1
      filter:
        # 开启Spring MVC请求资源采集和限流拦截
        enabled: false
        # Sentinel拦截器顺序，放在业务鉴权和安全签名之后
        order: 10

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:172.17.0.1}:${DB_PORT:13306}/${DB_NAME:dualx_prod}?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&useLegacyDatetimeCode=false
    username: root
    password: rootdbwebduwibc328#jhajd

  data:
