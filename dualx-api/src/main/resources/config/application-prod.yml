spring:
  cloud:
    sentinel:
      # 是否开启Sentinel客户端
      enabled: false
      # 启动时立即初始化并向控制台发送心跳
      eager: false
      # Web资源按请求方法区分，例如 GET:/api/account/exist
      http-method-specify: true
      # false=每个URL资源独立统计；true=统一到同一个Web上下文
      web-context-unify: false
      transport:
        # Sentinel控制台地址；本地控制台为 http://127.0.0.1:8858/
        dashboard: 172.17.0.1:8858
        # 应用本地启动一个HTTP端口，用于接收控制台推送规则
        port: 8200
        # Dashboard用Docker启动时，127.0.0.1会指向容器自己；这里填Docker能访问到的宿主机真实IP
        client-ip: 172.17.0.1
      filter:
        # 开启Spring MVC请求资源采集和限流拦截
        enabled: false
        # Sentinel拦截器顺序，放在业务鉴权和安全签名之后
        order: 10

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:172.17.0.1}:${DB_PORT:63306}/${DB_NAME:dualx_prod}?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&useLegacyDatetimeCode=false
    username: '${DB_USERNAME:root}'
    password: '${DB_PASSWORD}'

  data:
    redis:
      host: 172.17.0.1
      port: 6379
      database: 2
      password: '${REDIS_PASSWORD}'
      lettuce:
        pool:
          max-active: 20
          max-idle: 16
          max-wait: 1000ms
          min-idle: 10

logging:
  level:
    root: warn
    com.app: info


com.app:
  #一个IP可以注册账号限制
  userNumber: 2

  #文件上传路径
  upload:
    filePath: /data/upload/
    getHttpImg: 'https://www.web4x.net/upload/'

  task:
    enable: true
    cron:
      sampleCronTask: '0 */10 * * * ?'     # 示例cron任务
